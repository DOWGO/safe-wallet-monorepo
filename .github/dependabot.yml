# Keeps GitHub Actions (incl. the pinned DOWGO/.github reusable compliance workflow SHA)
# up to date, so the compliance-check pin does not go stale (avoids OIDC 401). DOW-320.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "Ops/Infra"
